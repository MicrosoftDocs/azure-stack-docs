# Reusable workflow: merges main into a specified release branch.
# Call this from a per-branch scheduler workflow.
# On merge conflict, the job fails and @sethmanheim is mentioned in the
# workflow run summary so GitHub sends a failure notification.

name: "[Template] Sync main → release branch"

on:
  workflow_call:
    inputs:
      release_branch:
        description: "The release branch to sync main into (e.g. release-ash-2604)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  sync:
    name: Merge main into ${{ inputs.release_branch }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch latest main
        run: git fetch origin main

      - name: Attempt merge of main into ${{ inputs.release_branch }}
        id: merge
        run: |
          if git merge origin/main --no-edit; then
            echo "merge_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "merge_status=conflict" >> "$GITHUB_OUTPUT"
            git merge --abort
          fi

      - name: Push merged branch
        if: steps.merge.outputs.merge_status == 'success'
        run: git push origin ${{ inputs.release_branch }}

      - name: Annotate run summary on conflict and fail
        if: steps.merge.outputs.merge_status == 'conflict'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## ❌ Merge conflict detected

          Merging `main` into `${{ inputs.release_branch }}` produced conflicts.
          The merge was **aborted** — no changes were pushed.

          **Action required:** @sethmanheim please resolve the conflicts manually:

          ```bash
          git checkout ${{ inputs.release_branch }}
          git fetch origin main
          git merge origin/main
          # resolve conflicts, then:
          git push origin ${{ inputs.release_branch }}
          ```
          EOF
          echo "::error::Merge conflict when merging main into ${{ inputs.release_branch }}. @sethmanheim please resolve manually."
          exit 1